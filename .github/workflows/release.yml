name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TDLIB_REF: master
  NDK_VERSION: 26.1.10909125
  ANDROID_ABI: arm64-v8a

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make git zlib1g-dev libssl-dev gperf cmake clang libc++-dev libc++abi-dev ninja-build perl

      - name: Setup extra 10GB swap
        # TDLib's td_jni.cpp pulls in tens of megabytes of generated headers
        # (td_api, telegram_api). Compiling it takes 6-8 GB of RAM per worker.
        # GitHub Actions runners have 7 GB total + a default 4 GB /swapfile —
        # not enough. We add 10 GB more on /mnt (which has plenty of disk on
        # GitHub-hosted runners). The two swap files sum, giving ~14 GB swap.
        run: |
          # GitHub runners already have /swapfile active; create ours elsewhere.
          sudo fallocate -l 10G /mnt/turbogram-swap
          sudo chmod 600 /mnt/turbogram-swap
          sudo mkswap /mnt/turbogram-swap
          sudo swapon /mnt/turbogram-swap
          free -h
          swapon --show
          echo "Extra swap configured."

      - name: Resolve TDLib commit
        id: tdlib-rev
        run: |
          set -e
          # TDLib does not publish git tags. Resolve TDLIB_REF as:
          # 1. an annotated tag (rare, e.g. third-party mirrors)
          # 2. a branch head (master, etc.)
          # 3. a literal commit sha if the above fail
          REV=$(git ls-remote https://github.com/tdlib/td.git refs/tags/${TDLIB_REF} | awk 'NR==1{print $1}')
          if [ -z "$REV" ]; then
            REV=$(git ls-remote https://github.com/tdlib/td.git refs/heads/${TDLIB_REF} | awk 'NR==1{print $1}')
          fi
          if [ -z "$REV" ] && [ ${#TDLIB_REF} -ge 7 ]; then
            # Looks like it could be a commit sha; use as-is.
            REV="${TDLIB_REF}"
          fi
          if [ -z "$REV" ]; then
            echo "Could not resolve TDLib ref ${TDLIB_REF}"; exit 1
          fi
          echo "rev=$REV" >> $GITHUB_OUTPUT
          echo "TDLib commit: $REV"

      - name: Cache TDLib AAR
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: app/libs/tdlib.aar
          key: tdlib-aar-${{ steps.tdlib-rev.outputs.rev }}-${{ env.ANDROID_ABI }}-ndk${{ env.NDK_VERSION }}-v2

      - name: Build TDLib AAR
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        env:
          # Cap parallel CMake/ninja workers to 2. Each tdjni.cpp compile uses
          # several GB of RAM; on the 7 GB GitHub runner -j 4 (default) triggers
          # OOM kill. -j 1 would be safe but doubles the build time.
          CMAKE_BUILD_PARALLEL_LEVEL: "2"
          MAKEFLAGS: "-j2"
        run: |
          set -euxo pipefail

          mkdir -p tdlib-src
          cd tdlib-src
          git init -q
          git remote add origin https://github.com/tdlib/td.git
          git fetch --depth 1 origin "${TDLIB_REF}"
          git checkout -q FETCH_HEAD

          cd example/android

          # Restrict build to arm64-v8a only by patching build scripts
          # The scripts iterate over ANDROID_ABIS; we override that list.
          for f in build-openssl.sh build-tdlib.sh; do
            if [ -f "$f" ]; then
              sed -i 's/^ANDROID_ABIS=.*/ANDROID_ABIS="arm64-v8a"/' "$f"
              sed -i 's/^arches=.*/arches="arm64-v8a"/' "$f" || true
              # Force parallelism cap at the script level too: TDLib's scripts
              # use cmake --build with implicit parallelism, but some call
              # ninja directly with -j$(nproc). Patch -j flags conservatively.
              sed -i -E 's/(ninja|make)([[:space:]]+)-j[[:space:]]*[0-9]+/\1\2-j 2/g' "$f" || true
              sed -i -E 's/--parallel[[:space:]]+[0-9]+/--parallel 2/g' "$f" || true
            fi
          done

          # Some versions iterate inside fetch-sdk/build scripts; patch the main entry too.
          if [ -f build.sh ]; then
            sed -i 's/^ANDROID_ABIS=.*/ANDROID_ABIS="arm64-v8a"/' build.sh || true
          fi

          # Run the build pipeline as documented in TDLib README for Android.
          ./fetch-sdk.sh || true

          # Build OpenSSL for arm64-v8a (small, parallel safe)
          ./build-openssl.sh

          # Build TDLib for arm64-v8a (memory-heavy, capped to -j 2 via env above)
          ./build-tdlib.sh

          # Find the produced AAR
          AAR=$(find . -name 'tdlib-release.aar' -o -name 'tdlib-debug.aar' | head -n1)
          if [ -z "$AAR" ]; then
            echo "TDLib AAR not produced; tree listing for debug:"
            find . -name '*.aar' || true
            find . -name 'libtdjni.so' || true
            exit 1
          fi
          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          cp "$AAR" "$GITHUB_WORKSPACE/app/libs/tdlib.aar"
          ls -lh "$GITHUB_WORKSPACE/app/libs/tdlib.aar"

      - name: Verify TDLib AAR exists
        run: |
          ls -lh app/libs/
          test -f app/libs/tdlib.aar

      - name: Prepare release keystore
        run: |
          set -e
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            cat > keystore.properties <<EOF
          storeFile=../keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
            echo "Using release keystore from secrets"
          else
            # Generate a one-shot keystore so the APK is at least signed.
            keytool -genkeypair -v \
              -keystore keystore.jks \
              -alias turbogram \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass changeit -keypass changeit \
              -dname "CN=Second Dream, O=Second Dream, C=IT"
            cat > keystore.properties <<EOF
          storeFile=../keystore.jks
          storePassword=changeit
          keyAlias=turbogram
          keyPassword=changeit
          EOF
            echo "Using generated ephemeral keystore (set KEYSTORE_BASE64 secret to override)"
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          test -n "$APK"
          cp "$APK" turbogram-${GITHUB_REF_NAME}.apk
          echo "path=turbogram-${GITHUB_REF_NAME}.apk" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: turbogram-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
