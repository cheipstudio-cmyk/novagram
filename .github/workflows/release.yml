name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TDLIB_REF: master
  NDK_VERSION: 26.1.10909125
  ANDROID_ABI: arm64-v8a

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make git zlib1g-dev libssl-dev gperf cmake clang libc++-dev libc++abi-dev ninja-build perl

      - name: Free disk space
        # GitHub-hosted runners ship with ~15 GB free on the root partition,
        # but TDLib's fetch-sdk.sh downloads its own Android SDK + NDK 23.2
        # (~3 GB), then build-openssl.sh + build-tdlib.sh produce 4-5 GB of
        # object files. Without cleanup we run out of disk halfway through.
        # Removing preinstalled toolchains we never touch (Haskell, Swift,
        # .NET, CodeQL) reclaims ~30 GB.
        run: |
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/chromium
          sudo apt-get clean
          df -h /

      - name: Setup extra 10GB swap
        # TDLib's td_jni.cpp pulls in tens of megabytes of generated headers
        # (td_api, telegram_api). Compiling it takes 6-8 GB of RAM per worker.
        # GitHub Actions runners have 7 GB total + a default 4 GB /swapfile,
        # not enough. We add 10 GB more on /mnt (which has plenty of disk on
        # GitHub-hosted runners). The two swap files sum, giving ~14 GB swap.
        run: |
          # GitHub runners already have /swapfile active; create ours elsewhere.
          sudo fallocate -l 10G /mnt/turbogram-swap
          sudo chmod 600 /mnt/turbogram-swap
          sudo mkswap /mnt/turbogram-swap
          sudo swapon /mnt/turbogram-swap
          free -h
          swapon --show
          echo "Extra swap configured."

      - name: Resolve TDLib commit
        id: tdlib-rev
        run: |
          set -e
          # TDLib does not publish git tags. Resolve TDLIB_REF as:
          # 1. an annotated tag (rare, e.g. third-party mirrors)
          # 2. a branch head (master, etc.)
          # 3. a literal commit sha if the above fail
          REV=$(git ls-remote https://github.com/tdlib/td.git refs/tags/${TDLIB_REF} | awk 'NR==1{print $1}')
          if [ -z "$REV" ]; then
            REV=$(git ls-remote https://github.com/tdlib/td.git refs/heads/${TDLIB_REF} | awk 'NR==1{print $1}')
          fi
          if [ -z "$REV" ] && [ ${#TDLIB_REF} -ge 7 ]; then
            # Looks like it could be a commit sha; use as-is.
            REV="${TDLIB_REF}"
          fi
          if [ -z "$REV" ]; then
            echo "Could not resolve TDLib ref ${TDLIB_REF}"; exit 1
          fi
          echo "rev=$REV" >> $GITHUB_OUTPUT
          echo "TDLib commit: $REV"

      - name: Cache TDLib AAR
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: app/libs/tdlib.aar
          key: tdlib-aar-${{ steps.tdlib-rev.outputs.rev }}-${{ env.ANDROID_ABI }}-ndk${{ env.NDK_VERSION }}-v3

      - name: Build TDLib AAR
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        env:
          # Cap parallel CMake/ninja workers to 2. Each tdjni.cpp compile uses
          # several GB of RAM; on the 7 GB GitHub runner -j 4 (default) triggers
          # OOM kill.
          CMAKE_BUILD_PARALLEL_LEVEL: "2"
          MAKEFLAGS: "-j2"
          ANDROID_ABIS: "arm64-v8a"
        run: |
          set -euxo pipefail

          mkdir -p tdlib-src
          cd tdlib-src
          git init -q
          git remote add origin https://github.com/tdlib/td.git
          git fetch --depth 1 origin "${TDLIB_REF}"
          git checkout -q FETCH_HEAD

          cd example/android

          # Restrict the build to arm64-v8a only. TDLib's build-tdlib.sh hard
          # codes the ABI list internally, so we patch every script that
          # declares ANDROID_ABIS, including indented / exported forms.
          for f in build-openssl.sh build-tdlib.sh build.sh; do
            [ -f "$f" ] || continue
            sed -i -E 's/^[[:space:]]*ANDROID_ABIS=.*/ANDROID_ABIS="arm64-v8a"/' "$f"
            sed -i -E 's/^[[:space:]]*export[[:space:]]+ANDROID_ABIS=.*/export ANDROID_ABIS="arm64-v8a"/' "$f"
            # Bash array form: ANDROID_ABIS=("arm64-v8a" "x86_64" ...)
            sed -i -E 's/^[[:space:]]*ANDROID_ABIS=\(.*\)/ANDROID_ABIS=("arm64-v8a")/' "$f"
            sed -i -E 's/(ninja|make)([[:space:]]+)-j[[:space:]]*[0-9]+/\1\2-j 2/g' "$f" || true
            sed -i -E 's/--parallel[[:space:]]+[0-9]+/--parallel 2/g' "$f" || true
          done

          # Show what we ended up with, so a future regression is easy to spot
          # in the run log.
          echo "::group::Effective ANDROID_ABIS in TDLib scripts"
          grep -n ANDROID_ABIS build-openssl.sh build-tdlib.sh 2>/dev/null || true
          echo "::endgroup::"

          ./fetch-sdk.sh || true
          ./build-openssl.sh
          ./build-tdlib.sh

          # build-tdlib.sh stops after copying libtdjni.so into tdlib/libs/.
          # The AAR itself is produced by the sibling Gradle project that
          # wraps those .so files together with the generated Java sources.
          # This step was missing from the previous workflow, which is why
          # the find for tdlib-release.aar returned empty.
          if [ -x ./gradlew ]; then
            ./gradlew :tdlib:assembleRelease --no-daemon --stacktrace
          else
            # Fall back to the host gradle if upstream stops shipping a wrapper.
            gradle :tdlib:assembleRelease --no-daemon --stacktrace
          fi

          AAR=$(find . -type f \( -name 'tdlib-release.aar' -o -name 'tdlib-debug.aar' -o -name 'tdlib.aar' \) | head -n1)
          if [ -z "$AAR" ]; then
            echo "TDLib AAR not produced; tree listing for debug:"
            find . -name '*.aar' || true
            find . -name 'libtdjni.so' || true
            exit 1
          fi
          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          cp "$AAR" "$GITHUB_WORKSPACE/app/libs/tdlib.aar"
          ls -lh "$GITHUB_WORKSPACE/app/libs/tdlib.aar"

      - name: Verify TDLib AAR exists
        run: |
          ls -lh app/libs/
          test -f app/libs/tdlib.aar

      - name: Prepare release keystore
        run: |
          set -e
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            cat > keystore.properties <<EOF
          storeFile=../keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
            echo "Using release keystore from secrets"
          else
            # Generate a one-shot keystore so the APK is at least signed.
            keytool -genkeypair -v \
              -keystore keystore.jks \
              -alias turbogram \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass changeit -keypass changeit \
              -dname "CN=Second Dream, O=Second Dream, C=IT"
            cat > keystore.properties <<EOF
          storeFile=../keystore.jks
          storePassword=changeit
          keyAlias=turbogram
          keyPassword=changeit
          EOF
            echo "Using generated ephemeral keystore (set KEYSTORE_BASE64 secret to override)"
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          test -n "$APK"
          cp "$APK" turbogram-${GITHUB_REF_NAME}.apk
          echo "path=turbogram-${GITHUB_REF_NAME}.apk" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: turbogram-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
