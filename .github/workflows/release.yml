name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TDLIB_REF: e0943d068ce90b5010f1aea946e6901e25b43bf6
  NDK_VERSION: 26.1.10909125
  ANDROID_ABI: arm64-v8a

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "ndk;${NDK_VERSION}"
          sdkmanager --install "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make git zlib1g-dev libssl-dev gperf cmake clang libc++-dev libc++abi-dev ninja-build perl php-cli

      - name: Free disk space
        # GitHub-hosted runners ship with ~15 GB free on the root partition,
        # but TDLib's fetch-sdk.sh downloads its own Android SDK + NDK 23.2
        # (~3 GB), then build-openssl.sh + build-tdlib.sh produce 4-5 GB of
        # object files. Without cleanup we run out of disk halfway through.
        # Removing preinstalled toolchains we never touch (Haskell, Swift,
        # .NET, CodeQL) reclaims ~30 GB.
        run: |
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/chromium
          sudo apt-get clean
          df -h /

      - name: Setup extra 10GB swap
        # TDLib's td_jni.cpp pulls in tens of megabytes of generated headers
        # (td_api, telegram_api). Compiling it takes 6-8 GB of RAM per worker.
        # GitHub Actions runners have 7 GB total + a default 4 GB /swapfile,
        # not enough. We add 10 GB more on /mnt (which has plenty of disk on
        # GitHub-hosted runners). The two swap files sum, giving ~14 GB swap.
        run: |
          sudo fallocate -l 10G /mnt/novagram-swap
          sudo chmod 600 /mnt/novagram-swap
          sudo mkswap /mnt/novagram-swap
          sudo swapon /mnt/novagram-swap
          free -h
          swapon --show
          echo "Extra swap configured."

      - name: Resolve TDLib commit
        id: tdlib-rev
        run: |
          set -e
          # TDLib does not publish git tags. Resolve TDLIB_REF as:
          # 1. an annotated tag (rare, e.g. third-party mirrors)
          # 2. a branch head (master, etc.)
          # 3. a literal commit sha if the above fail
          REV=$(git ls-remote https://github.com/tdlib/td.git refs/tags/${TDLIB_REF} | awk 'NR==1{print $1}')
          if [ -z "$REV" ]; then
            REV=$(git ls-remote https://github.com/tdlib/td.git refs/heads/${TDLIB_REF} | awk 'NR==1{print $1}')
          fi
          if [ -z "$REV" ] && [ ${#TDLIB_REF} -ge 7 ]; then
            REV="${TDLIB_REF}"
          fi
          if [ -z "$REV" ]; then
            echo "Could not resolve TDLib ref ${TDLIB_REF}"; exit 1
          fi
          echo "rev=$REV" >> $GITHUB_OUTPUT
          echo "TDLib commit: $REV"

      - name: Cache TDLib AAR
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: app/libs/tdlib.aar
          key: tdlib-aar-${{ steps.tdlib-rev.outputs.rev }}-${{ env.ANDROID_ABI }}-ndk${{ env.NDK_VERSION }}-v4

      - name: Build TDLib AAR
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        env:
          # Cap parallel CMake/ninja workers to 2. Each tdjni.cpp compile uses
          # several GB of RAM; on the 7 GB GitHub runner -j 4 (default) triggers
          # OOM kill.
          CMAKE_BUILD_PARALLEL_LEVEL: "2"
          MAKEFLAGS: "-j2"
        run: |
          set -euxo pipefail

          # 1. Fetch TDLib at the pinned ref
          mkdir -p tdlib-src
          cd tdlib-src
          git init -q
          git remote add origin https://github.com/tdlib/td.git
          git fetch --depth 1 origin "${TDLIB_REF}"
          git checkout -q FETCH_HEAD
          cd example/android

          # 2. Restrict the build to arm64-v8a only.
          # TDLib's scripts have a hardcoded loop in both files:
          #   for ABI in arm64-v8a armeabi-v7a x86_64 x86 ; do
          # There is no ANDROID_ABIS variable; patching one has no effect.
          # We rewrite the loop itself, then verify the patch took.
          for f in build-openssl.sh build-tdlib.sh; do
            sed -i -E 's/^[[:space:]]*for ABI in [^;]+ ; do/for ABI in arm64-v8a ; do/' "$f"
          done
          sed -i -E 's/(ninja|make)([[:space:]]+)-j[[:space:]]*[0-9]+/\1\2-j 2/g' build-openssl.sh build-tdlib.sh || true
          sed -i -E 's/--parallel[[:space:]]+[0-9]+/--parallel 2/g' build-openssl.sh build-tdlib.sh || true

          echo "::group::Effective ABI loop after patch"
          grep -n "for ABI" build-openssl.sh build-tdlib.sh
          for f in build-openssl.sh build-tdlib.sh; do
            if ! grep -qE '^for ABI in arm64-v8a ; do' "$f"; then
              echo "ERROR: ABI restriction patch failed in $f."
              echo "TDLib upstream likely changed the loop format. Inspect the script and update the sed."
              exit 2
            fi
          done
          echo "::endgroup::"

          # 3. Run the upstream build pipeline.
          ./fetch-sdk.sh || true
          ./build-openssl.sh
          ./build-tdlib.sh

          # 4. Package an AAR by hand.
          # build-tdlib.sh leaves these artifacts in ./tdlib/:
          #   tdlib/libs/<ABI>/libtdjni.so
          #   tdlib/java/org/drinkless/tdlib/Client.java
          #   tdlib/java/org/drinkless/tdlib/TdApi.java
          # It does NOT produce an .aar and there is no Gradle project here.
          # We assemble one: classes.jar + jni/ + AndroidManifest.xml + R.txt
          # is the minimal layout Gradle will accept as a library AAR.
          AAR_STAGE="$(mktemp -d)"
          mkdir -p "$AAR_STAGE/jni"
          cp -r tdlib/libs/. "$AAR_STAGE/jni/"

          # TdApi.java is generated then post-processed by AddIntDef.php which
          # injects androidx.annotation.IntDef references. Compile needs both
          # android.jar and androidx-annotation on the classpath.
          curl -sfLo annotation-1.4.0.jar https://maven.google.com/androidx/annotation/annotation/1.4.0/annotation-1.4.0.jar
          ANDROID_JAR="$(find "$ANDROID_SDK_ROOT/platforms" -name 'android.jar' 2>/dev/null | sort -r | head -n1)"
          if [ -z "$ANDROID_JAR" ]; then
            echo "ERROR: no android.jar found under $ANDROID_SDK_ROOT/platforms"
            exit 3
          fi
          echo "Compiling against $ANDROID_JAR"

          mkdir -p classes
          javac -d classes -classpath "$ANDROID_JAR:annotation-1.4.0.jar" \
            tdlib/java/org/drinkless/tdlib/Client.java \
            tdlib/java/org/drinkless/tdlib/TdApi.java
          jar cf "$AAR_STAGE/classes.jar" -C classes .

          printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="org.drinkless.tdlib"></manifest>\n' > "$AAR_STAGE/AndroidManifest.xml"
          : > "$AAR_STAGE/R.txt"

          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          ( cd "$AAR_STAGE" && zip -qr "$GITHUB_WORKSPACE/app/libs/tdlib.aar" . )
          ls -lh "$GITHUB_WORKSPACE/app/libs/tdlib.aar"
          echo "::group::AAR contents"
          unzip -l "$GITHUB_WORKSPACE/app/libs/tdlib.aar"
          echo "::endgroup::"

      - name: Verify TDLib AAR exists
        run: |
          ls -lh app/libs/
          test -f app/libs/tdlib.aar

      - name: Prepare release keystore
        run: |
          set -e
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            cat > keystore.properties <<EOF
          storeFile=../keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
            echo "Using release keystore from secrets"
          else
            keytool -genkeypair -v \
              -keystore keystore.jks \
              -alias novagram \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass changeit -keypass changeit \
              -dname "CN=Second Dream, O=Second Dream, C=IT"
            cat > keystore.properties <<EOF
          storeFile=../keystore.jks
          storePassword=changeit
          keyAlias=novagram
          keyPassword=changeit
          EOF
            echo "Using generated ephemeral keystore (set KEYSTORE_BASE64 secret to override)"
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build release APK + AAB
        # assembleRelease produces the standalone APK (for direct
        # sideload + GitHub Releases distribution); bundleRelease
        # produces the Android App Bundle for Play Console upload.
        # Both come out of the same signed build config so the
        # certificate matches between the two artifacts — important
        # for Play Console "internal app sharing" continuity.
        run: gradle :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          test -n "$APK"
          cp "$APK" novagram-${GITHUB_REF_NAME}.apk
          echo "path=novagram-${GITHUB_REF_NAME}.apk" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Locate AAB
        id: aab
        run: |
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -n1)
          test -n "$AAB"
          cp "$AAB" novagram-${GITHUB_REF_NAME}.aab
          echo "path=novagram-${GITHUB_REF_NAME}.aab" >> $GITHUB_OUTPUT
          ls -lh "$AAB"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novagram-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: novagram-aab
          path: ${{ steps.aab.outputs.path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Novagram ${{ github.ref_name }}
          body: |
            **Novagram ${{ github.ref_name }}** — Anthropic-powered Telegram client built on TDLib.

            ## Files
            - `novagram-${{ github.ref_name }}.apk` — install/sideload directly on Android
            - `novagram-${{ github.ref_name }}.aab` — Play Console upload bundle (not user-installable)

            ## Install
            Download the `.apk` and open it on Android. If you had an older version installed under a different package id, uninstall it first.

            See https://cheipstudio.org for full release notes.
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.aab.outputs.path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
