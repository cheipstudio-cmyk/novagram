# Compose Compiler stability configuration.
#
# Strong-skipping in Compose 1.7+ lets composables skip recomposition
# when their parameter references haven't changed. The compiler can't
# prove generated Java types like TdApi.Message are stable on its own,
# so it conservatively assumes they're NOT stable — meaning every
# parent recomposition forces every MessageBubble in view to recompose.
# On a long chat that adds up to a lot of wasted work per frame.
#
# Marking TdApi.Message stable here is SAFE because of the contract
# we've built around it in ChatScreen.kt:
#   1. Every in-place mutation site (UpdateMessageContent /
#      UpdateMessageInteractionInfo / local edit) ALSO bumps
#      `interactionRevisions[messageId]`.
#   2. The LazyColumn item lambda reads that revision and passes it to
#      MessageBubble as the `interactionRevision: Int` parameter.
#   3. Same-reference Message + changed revision Int → strong-skipping
#      sees the Int change → recomposes body → MessageContent picks up
#      the new bytes.
#
# If you add a new in-place mutation site on TdApi.Message, you MUST
# also bump interactionRevisions[id] or the bubble won't update. The
# three existing sites in ChatScreen.kt show the pattern; grep for
# `interactionRevisions\[` to find them.
#
# TdApi.User / TdApi.Chat / TdApi.* are deliberately NOT included.
# Those types we sometimes hand to other composables directly without
# a revision counter; until we audit those call paths the safe default
# is to leave them unstable so Compose recomposes them on every list
# write (the current behaviour we know works).
org.drinkless.tdlib.TdApi.Message
